<style>
/* ═══════════════════════════════════════════════════════════════
   DASHBOARD STAGE OUT — AUDITORIA
   style.html — CSS completo dark theme
   ═══════════════════════════════════════════════════════════════ */

/* ─── Variables ─────────────────────────────────────────────── */
:root {
  --bg:          #0d1117;
  --surface:     #161b22;
  --elevated:    #1c2128;
  --overlay:     #21262d;
  --border:      rgba(48,54,61,0.9);
  --border-soft: rgba(48,54,61,0.45);

  --txt:     #e6edf3;
  --txt-2:   #8b949e;
  --txt-3:   #484f58;

  --purple:  #7c3aed;  --purple-l: #a78bfa;
  --cyan:    #0891b2;  --cyan-l:   #22d3ee;
  --green:   #059669;  --green-l:  #34d399;
  --amber:   #b45309;  --amber-l:  #fbbf24;
  --pink:    #be185d;  --pink-l:   #f472b6;
  --blue:    #1d4ed8;  --blue-l:   #60a5fa;
  --red:     #b91c1c;  --red-l:    #f87171;

  --r-sm: 6px;  --r-md: 10px;  --r-lg: 14px;  --r-xl: 20px;

  --sh-sm: 0 1px 4px rgba(0,0,0,0.5);
  --sh-md: 0 4px 16px rgba(0,0,0,0.55);
  --sh-lg: 0 8px 32px rgba(0,0,0,0.65);

  --tr: all 0.2s ease;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  --mono: 'Cascadia Code','Fira Code','JetBrains Mono',monospace;
}

/* ─── Reset ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}
a{color:var(--purple-l);text-decoration:none}

/* ─── Loading Overlay ───────────────────────────────────────── */
.loading-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(13,17,23,0.94);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .35s ease;
}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner-wrap{text-align:center}
.spinner{
  width:48px;height:48px;margin:0 auto 14px;
  border:3px solid var(--border);border-top-color:var(--purple-l);
  border-radius:50%;animation:spin .75s linear infinite;
}
.spinner-label{color:var(--txt-2);font-size:.85rem;letter-spacing:.03em}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Header ────────────────────────────────────────────────── */
.dash-header{
  position:sticky;top:0;z-index:200;
  background:rgba(22,27,34,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  padding:11px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo-wrap{
  width:34px;height:34px;border-radius:var(--r-sm);
  background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25);
  display:flex;align-items:center;justify-content:center;
  color:var(--purple-l);flex-shrink:0;
}
.header-title{font-size:1.05rem;font-weight:700;color:var(--txt);line-height:1.2}
.header-sub{font-size:.7rem;color:var(--txt-2)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.last-update-text{font-size:.7rem;color:var(--txt-3);white-space:nowrap}

/* ─── Buttons ───────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:var(--r-sm);border:1px solid transparent;
  font-size:.78rem;font-weight:500;cursor:pointer;
  transition:var(--tr);white-space:nowrap;color:var(--txt);
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:none}
.btn-sm{padding:5px 11px;font-size:.74rem}

.btn-primary{background:var(--purple);border-color:rgba(167,139,250,.35);color:#fff}
.btn-primary:hover{background:var(--purple-l);border-color:var(--purple-l);color:#000}

.btn-outline{background:transparent;border-color:var(--border)}
.btn-outline:hover{border-color:var(--txt-2);color:var(--txt)}

.btn-ghost{background:transparent;border-color:transparent;color:var(--txt-2)}
.btn-ghost:hover{color:var(--txt);background:var(--elevated)}

.btn-icon{
  background:transparent;border-color:var(--border);
  color:var(--txt-2);padding:7px 9px;
}
.btn-icon:hover{color:var(--txt);border-color:var(--txt-2)}
.btn-icon svg{display:block}

/* ─── Main Layout ───────────────────────────────────────────── */
.dash-main{padding:20px 24px;max-width:1680px;margin:0 auto}

/* ─── KPI Grid ──────────────────────────────────────────────── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;margin-bottom:18px;
}

.kpi-card{
  position:relative;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:18px 16px;
  display:flex;gap:14px;align-items:flex-start;
  transition:var(--tr);
  animation:fadeUp .45s ease both;
}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  opacity:0;transition:opacity .25s;
}
.kpi-card:hover::before{opacity:1}

#kpi-card-audit  ::before,#kpi-card-audit  .kpi-card::before{background:var(--purple-l)}
#kpi-card-rua    .kpi-card::before{background:var(--cyan-l)}
#kpi-card-scuttle.kpi-card::before{background:var(--green-l)}
#kpi-card-gaiola .kpi-card::before{background:var(--amber-l)}
#kpi-card-sc     .kpi-card::before{background:var(--pink-l)}

#kpi-card-audit  {animation-delay:.00s} #kpi-card-audit  ::before{background:var(--purple-l)}
#kpi-card-rua    {animation-delay:.06s}
#kpi-card-scuttle{animation-delay:.12s}
#kpi-card-gaiola {animation-delay:.18s}
#kpi-card-sc     {animation-delay:.24s}

/* Individual top border per card */
#kpi-card-audit::before  {background:linear-gradient(90deg,var(--purple),var(--purple-l));opacity:1}
#kpi-card-rua::before    {background:linear-gradient(90deg,var(--cyan),var(--cyan-l));opacity:1}
#kpi-card-scuttle::before{background:linear-gradient(90deg,var(--green),var(--green-l));opacity:1}
#kpi-card-gaiola::before {background:linear-gradient(90deg,var(--amber),var(--amber-l));opacity:1}
#kpi-card-sc::before     {background:linear-gradient(90deg,var(--pink),var(--pink-l));opacity:1}

.kpi-icon-wrap{
  width:42px;height:42px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;flex-shrink:0;
}
.kpi-purple{background:rgba(124,58,237,.15)}
.kpi-cyan  {background:rgba(8,145,178,.15)}
.kpi-green {background:rgba(5,150,105,.15)}
.kpi-amber {background:rgba(180,83,9,.15)}
.kpi-pink  {background:rgba(190,24,93,.15)}

.kpi-body{flex:1;min-width:0}
.kpi-val{font-size:1.85rem;font-weight:800;line-height:1;color:var(--txt);margin-bottom:4px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:.7rem;color:var(--txt-2);font-weight:500;white-space:nowrap}
.kpi-sub{font-size:.65rem;color:var(--txt-3);margin-top:3px}

.kpi-glow{
  position:absolute;bottom:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  opacity:.07;pointer-events:none;
}
.kpi-glow-purple{background:var(--purple-l)}
.kpi-glow-cyan  {background:var(--cyan-l)}
.kpi-glow-green {background:var(--green-l)}
.kpi-glow-amber {background:var(--amber-l)}
.kpi-glow-pink  {background:var(--pink-l)}

/* Skeleton */
.skeleton-text{
  display:inline-block;min-width:80px;height:2rem;
  background:linear-gradient(90deg,var(--elevated) 25%,var(--overlay) 50%,var(--elevated) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
  border-radius:var(--r-sm);color:transparent!important;
}
@keyframes shimmer{to{background-position:-200% 0}}

.skel-rows{padding:8px 0}
.skel-row{
  height:44px;border-radius:var(--r-sm);margin-bottom:8px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--elevated) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
}
.skel-row:nth-child(2){animation-delay:.08s}
.skel-row:nth-child(3){animation-delay:.16s}
.skel-row:nth-child(4){animation-delay:.24s}
.skel-row:nth-child(5){animation-delay:.32s}

/* ─── Filters Bar ────────────────────────────────────────────── */
.filters-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px 18px;margin-bottom:18px;
}
.filters-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-field{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:.65rem;color:var(--txt-2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.filter-input{
  background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--txt);padding:7px 10px;font-size:.8rem;
  transition:var(--tr);min-width:138px;
}
.filter-input:focus{outline:none;border-color:var(--purple-l);box-shadow:0 0 0 3px rgba(167,139,250,.1)}
.filter-input option{background:var(--elevated)}
.filter-sm{min-width:70px}
.filter-actions{display:flex;gap:8px;align-self:flex-end}
.filter-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* ─── Badges ─────────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:999px;font-size:.67rem;font-weight:600;
}
.badge-info   {background:rgba(8,145,178,.13);color:var(--cyan-l);border:1px solid rgba(8,145,178,.25)}
.badge-cyan   {background:rgba(8,145,178,.13);color:var(--cyan-l);border:1px solid rgba(8,145,178,.25)}
.badge-success{background:rgba(5,150,105,.13);color:var(--green-l);border:1px solid rgba(5,150,105,.25)}
.badge-warning{background:rgba(180,83,9,.13);color:var(--amber-l);border:1px solid rgba(180,83,9,.25)}
.badge-amber  {background:rgba(180,83,9,.13);color:var(--amber-l);border:1px solid rgba(180,83,9,.25)}
.badge-error  {background:rgba(185,28,28,.13);color:var(--red-l);border:1px solid rgba(185,28,28,.25)}
.badge-purple {background:rgba(124,58,237,.13);color:var(--purple-l);border:1px solid rgba(124,58,237,.25)}
.badge-neutral{background:var(--elevated);color:var(--txt-2);border:1px solid var(--border)}

/* ─── Content Grid ───────────────────────────────────────────── */
.content-grid{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:18px;align-items:start;
}

/* ─── Panels ─────────────────────────────────────────────────── */
.panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;
}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:10px;
}
.panel-title{font-size:.88rem;font-weight:700;color:var(--txt)}
.panel-sub{font-size:.7rem;color:var(--txt-2)}
.table-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ─── Search ─────────────────────────────────────────────────── */
.search-wrap{position:relative}
.search-ico{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--txt-3);pointer-events:none;display:flex;align-items:center;
}
.search-input{
  background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--txt);padding:6px 10px 6px 28px;font-size:.78rem;
  width:210px;transition:var(--tr);
}
.search-input:focus{outline:none;border-color:var(--purple-l);width:250px;box-shadow:0 0 0 3px rgba(167,139,250,.1)}
.perpage-wrap{display:flex;align-items:center;gap:5px}
.perpage-lbl{font-size:.72rem;color:var(--txt-2);white-space:nowrap}

/* ─── Table ──────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.79rem}

.data-table thead th{
  position:sticky;top:0;z-index:10;
  background:var(--elevated);color:var(--txt-2);
  font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:10px 13px;border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;transition:var(--tr);
}
.data-table thead th:hover{color:var(--txt);background:var(--overlay)}
.data-table thead th.sort-asc::after {content:' ▲';font-size:.55rem;color:var(--purple-l)}
.data-table thead th.sort-desc::after{content:' ▼';font-size:.55rem;color:var(--purple-l)}

.data-table tbody tr.main-row{cursor:pointer;transition:background .15s}
.data-table tbody tr.main-row:hover{background:var(--elevated)}
.data-table tbody tr.main-row.is-open{background:rgba(124,58,237,.06)}

.data-table td{
  padding:10px 13px;border-bottom:1px solid var(--border-soft);
  color:var(--txt);white-space:nowrap;max-width:220px;
  overflow:hidden;text-overflow:ellipsis;vertical-align:middle;
}
.data-table tbody tr.main-row.is-open td{border-bottom-color:transparent}

/* expand toggle */
.toggle-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:rgba(124,58,237,.12);color:var(--purple-l);
  font-size:.6rem;transition:transform .2s ease,background .15s;
  flex-shrink:0;
}
.main-row.is-open .toggle-btn{transform:rotate(90deg);background:rgba(124,58,237,.28)}

.cell-flex{display:flex;align-items:center;gap:8px}

/* Audit ID chip */
.id-chip{
  font-family:var(--mono);font-size:.73rem;
  background:rgba(124,58,237,.12);color:var(--purple-l);
  padding:2px 8px;border-radius:5px;letter-spacing:.02em;
  border:1px solid rgba(124,58,237,.22);
}
.id-chip-cyan{
  font-family:var(--mono);font-size:.73rem;
  background:rgba(8,145,178,.12);color:var(--cyan-l);
  padding:2px 8px;border-radius:5px;letter-spacing:.02em;
  border:1px solid rgba(8,145,178,.22);
}

/* Accordion */
.acc-row{display:none}
.acc-row.open{display:table-row}
.acc-row>td{
  padding:0!important;
  border-bottom:2px solid rgba(124,58,237,.18)!important;
}
.acc-inner{padding:12px 14px 16px 50px;background:rgba(10,13,19,.55);width:100%}

.acc-head{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:12px;font-size:.73rem;color:var(--txt-2);
}
.acc-id{color:var(--purple-l);font-family:var(--mono);font-size:.78rem}

/* ─── Accordion Detail Grid ─────────────────────────────────── */
.acc-detail-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px 16px;
  margin-bottom:14px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border-soft);
}
.acc-field{display:flex;flex-direction:column;gap:3px}
.acc-field-wide{grid-column:1 / -1}
.acc-field-lbl{font-size:.62rem;color:var(--txt-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.acc-field-val{font-size:.78rem;color:var(--txt)}

/* ─── Accordion TO Section ──────────────────────────────────── */
.acc-to-section{padding-top:4px}
.acc-to-header{
  font-size:.73rem;color:var(--txt-2);font-weight:600;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.acc-to-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:5px;
}
.acc-to-item{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border-soft);
  border-radius:var(--r-sm);padding:5px 10px;
  transition:border-color .15s;
}
.acc-to-item:hover{border-color:rgba(34,211,238,.3)}
.acc-to-num{font-size:.62rem;color:var(--txt-3);min-width:18px;text-align:right;flex-shrink:0}
.to-code{font-family:var(--mono);font-size:.72rem;color:var(--cyan-l);word-break:break-all}
.acc-no-to{font-size:.76rem;color:var(--txt-3);padding:4px 0}

/* Empty state */
.empty-state{text-align:center;padding:52px 20px;color:var(--txt-2)}
.empty-icon{
  width:52px;height:52px;border-radius:50%;
  background:var(--elevated);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--txt-3);margin:0 auto 14px;
}
.empty-state h3{font-size:.95rem;margin-bottom:5px;color:var(--txt)}
.empty-state p{font-size:.79rem}

.toast-icon{display:flex;align-items:center;flex-shrink:0}

/* ─── Pagination ─────────────────────────────────────────────── */
.pagination-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-top:1px solid var(--border);
  flex-wrap:wrap;gap:8px;
}
.pag-info{font-size:.73rem;color:var(--txt-2)}
.pag-controls{display:flex;gap:3px;flex-wrap:wrap}
.pg-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:30px;height:30px;padding:0 5px;
  border:1px solid var(--border);border-radius:var(--r-sm);
  background:transparent;color:var(--txt-2);font-size:.76rem;
  cursor:pointer;transition:var(--tr);font-family:var(--font);
}
.pg-btn:hover:not(:disabled){background:var(--elevated);color:var(--txt)}
.pg-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}

/* ─── Chart Panel ────────────────────────────────────────────── */
.chart-panel{display:flex;flex-direction:column}
.chart-area{padding:14px;position:relative;height:260px}
.chart-area canvas{max-height:100%}
.ranking-wrap{padding:0 14px 14px;display:flex;flex-direction:column;gap:5px}

.rank-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:var(--r-sm);background:var(--elevated);
  transition:var(--tr);
}
.rank-item:hover{background:var(--overlay)}

.rank-pos{
  width:21px;height:21px;border-radius:50%;
  background:rgba(124,58,237,.14);color:var(--purple-l);
  font-size:.67rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.rank-pos.gold  {background:rgba(251,191,36,.18);color:var(--amber-l)}
.rank-pos.silver{background:rgba(139,148,158,.18);color:#8b949e}
.rank-pos.bronze{background:rgba(180,83,9,.18);color:#d97706}

.rank-name{flex:1;font-size:.76rem;color:var(--txt);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-bg{flex:2;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.rank-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:3px;transition:width .6s ease}
.rank-count{font-size:.73rem;font-weight:700;color:var(--txt);min-width:26px;text-align:right}

/* ─── Toast ──────────────────────────────────────────────────── */
.toast-wrap{
  position:fixed;bottom:18px;right:18px;z-index:10000;
  display:flex;flex-direction:column;gap:7px;align-items:flex-end;
}
.toast{
  padding:9px 15px;border-radius:var(--r-md);font-size:.78rem;
  color:#fff;box-shadow:var(--sh-lg);
  display:flex;align-items:center;gap:7px;max-width:290px;
  animation:slideIn .28s ease;
}
.toast-success{background:#065f46;border:1px solid var(--green)}
.toast-error  {background:#7f1d1d;border:1px solid var(--red)}
.toast-info   {background:#1e3a5f;border:1px solid var(--blue)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}}

/* ─── Animations ─────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ─── Responsive ─────────────────────────────────────────────── */
@media(max-width:1200px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .content-grid{grid-template-columns:1fr}
  .chart-panel{order:-1}
  .chart-area{height:220px}
}
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:680px){
  .dash-header{padding:10px 14px}
  .dash-main{padding:14px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:1.5rem}
  .filters-row{flex-direction:column}
  .filter-input{min-width:100%;width:100%}
  .search-input,.search-input:focus{width:100%}
  .search-wrap{flex:1}
